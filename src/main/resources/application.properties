# ---------------------------------------
# OUTBOX PROCESSOR
# ---------------------------------------
app.outbox.poll-interval-ms=5000
app.outbox.max-attempts=5
# ---------------------------------------
# ACTUATOR
# ---------------------------------------
management.endpoints.web.exposure.include=health,info
# ---------------------------------------
# LOGGING
# ---------------------------------------
logging.level.org.flowable=WARN
logging.level.org.hibernate.SQL=WARN